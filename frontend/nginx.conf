# nginx del contenedor frontend: sirve la SPA y reenvía /api, /admin,
# /static y /media al backend. Es la única puerta del subproyecto: NPM
# (en el VPS) apunta wind-homes.triplerush.tech aquí.

upstream wh_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Tamaño de body generoso por si se sube imagen de propiedad desde admin.
    client_max_body_size 20M;

    # Cache largo para los assets versionados de Vite (tienen hash en el nombre).
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API JSON + admin de Django + DRF browsable + endpoints SimpleJWT.
    location /api/ {
        proxy_pass http://wh_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /admin/ {
        proxy_pass http://wh_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WhiteNoise (en el backend) sirve los estáticos del admin y DRF.
    location /static/ {
        proxy_pass http://wh_backend;
        proxy_set_header Host $host;
    }

    # Media subido (imágenes de propiedades) servido por el backend.
    location /media/ {
        proxy_pass http://wh_backend;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Fallback SPA: cualquier ruta no anterior la resuelve React Router.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
