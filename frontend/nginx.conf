# nginx del contenedor frontend: sirve la SPA y reenvía /api, /admin,
# /static y /media al backend. Es la única puerta del subproyecto: NPM
# (en el VPS) apunta wind-homes.triplerush.tech aquí.

upstream wh_backend {
    server backend:8000;
}

map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    https https;
    http http;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20M;

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://wh_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 60s;
    }

    location /admin/ {
        proxy_pass http://wh_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location /static/ {
        proxy_pass http://wh_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location /media/ {
        proxy_pass http://wh_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
