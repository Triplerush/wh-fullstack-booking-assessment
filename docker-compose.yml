services:
  postgres:
    image: postgres:15-alpine
    container_name: wh_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wind_homes}
      POSTGRES_USER: ${POSTGRES_USER:-wind_homes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - wh_pgdata:/var/lib/postgresql/data
    networks:
      - wh_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-wind_homes}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    image: ${BACKEND_IMAGE:-ghcr.io/triplerush/wh_backend:latest}
    container_name: wh_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      SECRET_KEY: ${DJANGO_SECRET_KEY}
      DATABASE_URL: postgres://${POSTGRES_USER:-wind_homes}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-wind_homes}
      POSTGRES_HOST: postgres
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      SITE_URL: ${SITE_URL}
      EMAIL_PROVIDER: brevo
      BREVO_API_KEY: ${BREVO_API_KEY}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
    volumes:
      - wh_media:/app/media
    networks:
      - wh_internal
    command:
      - sh
      - -c
      - python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --access-logfile - --error-logfile -

  frontend:
    build: ./frontend
    image: ${FRONTEND_IMAGE:-ghcr.io/triplerush/wh_frontend:latest}
    container_name: wh_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - wh_internal    
      - portfolio-net  

networks:
  wh_internal:
    driver: bridge
  portfolio-net:
    external: true

volumes:
  wh_pgdata:
  wh_media:
